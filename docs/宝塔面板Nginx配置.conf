server {
    listen 80;
    server_name your-domain.com;
    root /www/wwwroot/your-domain.com;
    index index.php index.html;

    # 正确的 MIME 类型
    include mime.types;
    types {
        application/javascript js mjs;
        text/css css;
        application/json json;
        image/svg+xml svg svgz;
    }

    # 安装目录
    location /install {
        index index.php;
        try_files $uri $uri/ /install/index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # API 路由
    location /api {
        try_files $uri $uri/ /public/api/index.php?$query_string;
    }

    # 管理后台
    location /admin {
        try_files $uri $uri/ /public/admin/index.html?$query_string;
    }

    # 根路径
    location / {
        try_files $uri $uri/ /public/index.html?$query_string;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
