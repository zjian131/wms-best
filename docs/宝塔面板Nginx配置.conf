server {
    listen 80;
    server_name zenk.indevs.in; # 替换为你的域名
    root /www/wwwroot/退换货管理系统; # 替换为你的网站根目录
    index index.php index.html index.htm;
    
    # 正确的 MIME 类型
    include mime.types;
    types {
        application/javascript js mjs;
        text/css css;
        application/json json;
        image/svg+xml svg svgz;
    }
    
    # 日志
    access_log /www/wwwroot/退换货管理系统/logs/access.log;
    error_log /www/wwwroot/退换货管理系统/logs/error.log;
    
    # 安全配置
    location ~ /\. {
        deny all;
    }
    
    # PHP 处理
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-82.sock; # 根据你的PHP版本调整
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
    
    # 根路径处理
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # API 路径处理
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # 安装路径处理
    location /install {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # 管理后台路径处理
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # 静态文件缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|html)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ /index.php?$query_string;
    }
}
