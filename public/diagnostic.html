<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统诊断 - 退换货管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 28px; margin-bottom: 30px; color: #333; text-align: center; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #555; }
    .test-item {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .test-item.success { background: #f6ffed; border: 1px solid #b7eb8f; }
    .test-item.error { background: #fff2f0; border: 1px solid #ffccc7; }
    .test-item.warning { background: #fffbe6; border: 1px solid #ffe58f; }
    .test-item.info { background: #e6f7ff; border: 1px solid #91d5ff; }
    .status { font-weight: 600; }
    .status.success { color: #52c41a; }
    .status.error { color: #ff4d4f; }
    .status.warning { color: #faad14; }
    .status.info { color: #1890ff; }
    .btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover { transform: translateY(-1px); }
    .details { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0f0f0; }
    .details pre {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 系统诊断工具</h1>
    
    <div class="card">
      <h2>1. 基础环境检测</h2>
      <div id="basicTests"></div>
    </div>
    
    <div class="card">
      <h2>2. API 连接测试</h2>
      <div id="apiTests"></div>
    </div>
    
    <div class="card">
      <h2>3. 浏览器信息</h2>
      <div id="browserInfo"></div>
    </div>
    
    <div class="card" style="text-align: center;">
      <button class="btn" onclick="runDiagnostics()">🔄 重新运行诊断</button>
      <button class="btn" style="background: #52c41a; margin-left: 10px;" onclick="window.location.href='/'">🚀 前往首页</button>
    </div>
    
    <div class="card">
      <h2>诊断详情</h2>
      <div class="details">
        <pre id="diagnosticLog">等待运行诊断...</pre>
      </div>
    </div>
  </div>

  <script>
    let log = '';
    
    function addLog(message) {
      const time = new Date().toLocaleTimeString();
      log += `[${time}] ${message}\n`;
      document.getElementById('diagnosticLog').textContent = log;
    }
    
    function createTestItem(title, status, details) {
      const item = document.createElement('div');
      item.className = `test-item ${status}`;
      const statusText = {
        success: '✓ 通过',
        error: '✗ 失败',
        warning: '⚠ 警告',
        info: 'ℹ 信息'
      };
      item.innerHTML = `
        <span>${title}</span>
        <span class="status ${status}">${statusText[status]}</span>
      `;
      if (details) {
        const detailDiv = document.createElement('div');
        detailDiv.style.fontSize = '12px';
        detailDiv.style.color = '#666';
        detailDiv.style.marginTop = '8px';
        detailDiv.textContent = details;
        item.appendChild(detailDiv);
      }
      return item;
    }
    
    function runDiagnostics() {
      log = '';
      addLog('开始系统诊断...');
      document.getElementById('diagnosticLog').textContent = log;
      
      const basicContainer = document.getElementById('basicTests');
      basicContainer.innerHTML = '';
      
      // 测试 1: JavaScript 启用
      basicContainer.appendChild(createTestItem('JavaScript 已启用', 'success', navigator.userAgent));
      addLog('✓ JavaScript 正常');
      
      // 测试 2: LocalStorage
      try {
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        basicContainer.appendChild(createTestItem('LocalStorage 可用', 'success'));
        addLog('✓ LocalStorage 正常');
      } catch(e) {
        basicContainer.appendChild(createTestItem('LocalStorage 不可用', 'error', e.message));
        addLog('✗ LocalStorage 错误: ' + e.message);
      }
      
      // 测试 3: Fetch API
      if (window.fetch) {
        basicContainer.appendChild(createTestItem('Fetch API 可用', 'success'));
        addLog('✓ Fetch API 正常');
      } else {
        basicContainer.appendChild(createTestItem('Fetch API 不可用', 'error'));
        addLog('✗ Fetch API 不支持');
      }
      
      // 浏览器信息
      const browserContainer = document.getElementById('browserInfo');
      browserContainer.innerHTML = '';
      browserContainer.appendChild(createTestItem('浏览器', 'info', navigator.userAgent));
      browserContainer.appendChild(createTestItem('语言', 'info', navigator.language));
      browserContainer.appendChild(createTestItem('屏幕', 'info', `${screen.width}x${screen.height}`));
      browserContainer.appendChild(createTestItem('Cookie', navigator.cookieEnabled ? 'success' : 'error', navigator.cookieEnabled ? '已启用' : '已禁用'));
      
      // API 测试
      const apiContainer = document.getElementById('apiTests');
      apiContainer.innerHTML = '';
      
      addLog('正在测试 API 连接...');
      
      // 测试 API 根路径
      fetch('/api/health')
        .then(res => {
          apiContainer.appendChild(createTestItem('API 响应', res.ok ? 'success' : 'error', `HTTP ${res.status}`));
          addLog(`API 状态: HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          addLog('API 响应内容: ' + text);
        })
        .catch(err => {
          apiContainer.appendChild(createTestItem('API 连接', 'error', err.message));
          addLog('✗ API 连接失败: ' + err.message);
        });
      
      // 测试静态文件访问
      fetch('/index.html')
        .then(res => {
          apiContainer.appendChild(createTestItem('静态文件访问', res.ok ? 'success' : 'error', `HTTP ${res.status}`));
          addLog('✓ 静态文件访问正常');
        })
        .catch(err => {
          apiContainer.appendChild(createTestItem('静态文件访问', 'error', err.message));
          addLog('✗ 静态文件访问失败: ' + err.message);
        });
      
      addLog('诊断完成');
    }
    
    // 页面加载时自动运行
    window.onload = function() {
      addLog('页面已加载');
      setTimeout(runDiagnostics, 500);
    };
  </script>
</body>
</html>
