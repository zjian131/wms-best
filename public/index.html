<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 退换货管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; text-align: center; color: #333; }
    p.subtitle { color: #666; text-align: center; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .error { background: #fff1f0; color: #ff4d4f; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>退换货管理系统</h1>
    <p class="subtitle">请登录您的账号</p>
    
    <div id="error" class="error" style="display: none;"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="email" id="email" required placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" required placeholder="请输入密码">
      </div>
      <button type="submit">登录</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      
      fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem('token', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          errorDiv.textContent = data.message || '登录失败';
          errorDiv.style.display = 'block';
        }
      })
      .catch(() => {
        errorDiv.textContent = '网络错误，请稍后重试';
        errorDiv.style.display = 'block';
      });
    });
  </script>
</body>
</html>
