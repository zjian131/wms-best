<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>登录 - 退换货管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
    }
    h1 {
      font-size: 26px;
      color: #333;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102,126,234,0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .error {
      background: #fff1f0;
      color: #ff4d4f;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .success {
      background: #f6ffed;
      color: #52c41a;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    .links {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
    }
    .links a {
      color: #667eea;
      text-decoration: none;
      margin: 0 10px;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>退换货管理系统</h1>
    <p class="subtitle">请登录您的账号</p>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">邮箱地址</label>
        <input type="email" id="email" name="email" required placeholder="请输入您的邮箱">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required placeholder="请输入您的密码">
      </div>
      <button type="submit" id="loginBtn">登录</button>
    </form>
    
    <div class="links">
      <a href="/install/index.php">安装系统</a>
      <a href="/diagnostic.html">系统诊断</a>
    </div>
  </div>

  <script>
    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
      console.log('页面已加载');
      
      const form = document.getElementById('loginForm');
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      const loginBtn = document.getElementById('loginBtn');
      
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        loginBtn.textContent = '登录中...';
        loginBtn.disabled = true;
        
        console.log('尝试登录:', email);
        
        // 检查是否已安装
        fetch('/api/health')
          .then(res => res.json())
          .then(data => {
            console.log('健康检查:', data);
            if (!data.installed) {
              window.location.href = '/install/index.php';
              return;
            }
            
            // 尝试登录
            return fetch('/api/auth/login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ email: email, password: password })
            });
          })
          .then(res => {
            if (!res) return;
            console.log('登录响应:', res.status);
            return res.json();
          })
          .then(data => {
            if (!data) return;
            console.log('登录数据:', data);
            
            if (data.success) {
              localStorage.setItem('token', data.token);
              localStorage.setItem('user', JSON.stringify(data.user));
              successDiv.textContent = '登录成功！正在跳转...';
              successDiv.style.display = 'block';
              setTimeout(function() {
                window.location.href = '/admin/dashboard.html';
              }, 800);
            } else {
              errorDiv.textContent = data.message || '登录失败，请重试';
              errorDiv.style.display = 'block';
            }
          })
          .catch(function(err) {
            console.error('登录错误:', err);
            errorDiv.textContent = '网络连接错误: ' + (err.message || '请检查网络连接');
            errorDiv.style.display = 'block';
          })
          .finally(function() {
            loginBtn.textContent = '登录';
            loginBtn.disabled = false;
          });
      });
    });
  </script>
</body>
</html>
