<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 跨境电商退换货管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .header {
            background: white;
            padding: 20px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 20px;
            color: #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .logout-btn:hover {
            background: #5a6fd6;
        }
        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        .section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .menu-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 12px;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .menu-item h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .menu-item p {
            font-size: 14px;
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            color: #666;
            font-weight: 500;
            font-size: 14px;
        }
        td {
            color: #333;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>跨境电商退换货管理系统</h1>
        <div class="user-info">
            <span id="user-name">加载中...</span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <h3>店铺数量</h3>
                <div class="value" id="stat-stores">-</div>
            </div>
            <div class="stat-card">
                <h3>可用商品</h3>
                <div class="value" id="stat-products">-</div>
            </div>
            <div class="stat-card">
                <h3>订单总数</h3>
                <div class="value" id="stat-orders">-</div>
            </div>
            <div class="stat-card">
                <h3>待处理退货</h3>
                <div class="value" id="stat-returns">-</div>
            </div>
        </div>

        <div class="section">
            <h2>快捷功能</h2>
            <div class="menu-grid">
                <div class="menu-item" onclick="location.href='/admin/stores.html'">
                    <h3>🏪</h3>
                    <p>店铺管理</p>
                </div>
                <div class="menu-item" onclick="location.href='/admin/products.html'">
                    <h3>📦</h3>
                    <p>商品管理</p>
                </div>
                <div class="menu-item" onclick="location.href='/admin/warehouses.html'">
                    <h3>🏠</h3>
                    <p>仓库管理</p>
                </div>
                <div class="menu-item" onclick="location.href='/admin/orders.html'">
                    <h3>📋</h3>
                    <p>订单管理</p>
                </div>
                <div class="menu-item" onclick="location.href='/admin/returns.html'">
                    <h3>↩️</h3>
                    <p>退货管理</p>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>最近退货</h2>
            <div id="recent-returns">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/admin/index.html';
                return null;
            }
            return token;
        }

        async function fetchDashboard() {
            const token = await checkAuth();
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/dashboard`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const data = await response.json();

                document.getElementById('user-name').textContent = data.user?.name || '管理员';
                document.getElementById('stat-stores').textContent = data.stats?.stores || 0;
                document.getElementById('stat-products').textContent = data.stats?.available_products || 0;
                document.getElementById('stat-orders').textContent = data.stats?.total_orders || 0;
                document.getElementById('stat-returns').textContent = data.stats?.pending_returns || 0;

                const returnsHtml = data.recent_returns?.length > 0
                    ? `<table>
                        <thead>
                            <tr>
                                <th>退货单号</th>
                                <th>店铺</th>
                                <th>状态</th>
                                <th>退款金额</th>
                                <th>退货日期</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.recent_returns.map(r => `
                                <tr>
                                    <td>${r.return_number}</td>
                                    <td>${r.store?.store_name || '-'}</td>
                                    <td>${r.status}</td>
                                    <td>${r.currency} ${r.refund_amount}</td>
                                    <td>${new Date(r.return_date).toLocaleDateString('zh-CN')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`
                    : '<p style="text-align:center;color:#999;padding:20px;">暂无数据</p>';

                document.getElementById('recent-returns').innerHTML = returnsHtml;

            } catch (error) {
                console.error('Failed to fetch dashboard:', error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/admin/index.html';
        }

        fetchDashboard();
    </script>
</body>
</html>
