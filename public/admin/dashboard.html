<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - 退换货管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }
    /* 侧边栏 */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
    }
    .sidebar h2 { margin-bottom: 30px; font-size: 20px; }
    .menu-item {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.3s;
      color: rgba(255,255,255,0.8);
    }
    .menu-item:hover, .menu-item.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }
    /* 主内容区 */
    .main { margin-left: 250px; padding: 30px; }
    .header {
      background: white;
      padding: 20px 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; color: #333; }
    /* 统计卡片 */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
    }
    .stat-value { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .stat-label { color: #666; font-size: 14px; }
    .purple { color: #667eea; }
    .green { color: #52c41a; }
    .orange { color: #fa8c16; }
    .blue { color: #1890ff; }
    /* 内容卡片 */
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 16px; color: #333; }
    /* 按钮 */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-primary { background: #667eea; color: white; }
    .btn-logout { background: #ff4d4f; color: white; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>退换货管理系统</h2>
    <div class="menu-item active">仪表盘</div>
    <div class="menu-item">店铺管理</div>
    <div class="menu-item">商品管理</div>
    <div class="menu-item">订单管理</div>
    <div class="menu-item">退货管理</div>
    <div class="menu-item">仓库管理</div>
    <div class="menu-item">系统设置</div>
  </div>

  <div class="main">
    <div class="header">
      <h1>仪表盘</h1>
      <button class="btn btn-logout" onclick="logout()">退出登录</button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value purple">12</div>
        <div class="stat-label">店铺数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value green">156</div>
        <div class="stat-label">商品库存</div>
      </div>
      <div class="stat-card">
        <div class="stat-value orange">28</div>
        <div class="stat-label">待处理退货</div>
      </div>
      <div class="stat-card">
        <div class="stat-value blue">1,234</div>
        <div class="stat-label">订单总数</div>
      </div>
    </div>

    <div class="card">
      <h3>最近活动</h3>
      <p>欢迎使用退换货管理系统！</p>
      <p style="color:#666; margin-top:10px;">系统功能正在开发中...</p>
    </div>
  </div>

  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/';
    }
  </script>
</body>
</html>
